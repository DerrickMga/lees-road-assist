version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: lra_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lees_road_assist
      POSTGRES_USER: ${POSTGRES_USER:-lra_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks: [lra_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lra_user} -d lees_road_assist"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lra_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [lra_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lra_backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lra_user}:${POSTGRES_PASSWORD}@db:5432/lees_road_assist
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FRONTEND_URL: https://leesrca.kmgvitallinks.com
      APP_ENV: production
      DEBUG: "false"
    volumes:
      - ./backend/static:/app/static
      - ./backend/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [lra_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lra_celery
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lra_user}:${POSTGRES_PASSWORD}@db:5432/lees_road_assist
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend/static:/app/static
      - ./backend/logs:/app/logs
    depends_on:
      - backend
      - redis
    networks: [lra_net]

  # ── WhatsApp Bot ──────────────────────────────────────────────────────────
  whatsapp:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lra_whatsapp
    restart: unless-stopped
    command: uvicorn whatsapp_webhook:app --host 0.0.0.0 --port 8001 --workers 1
    env_file: ./backend/.env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lra_user}:${POSTGRES_PASSWORD}@db:5432/lees_road_assist
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - backend
    networks: [lra_net]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Web (Next.js) ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://leesrca.kmgvitallinks.com/api/v1
        NEXT_PUBLIC_WS_URL: wss://leesrca.kmgvitallinks.com/api/v1/ws
    container_name: lra_web
    restart: unless-stopped
    networks: [lra_net]
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx (reverse proxy + SSL termination) ───────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: lra_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
      - backend
      - whatsapp
    networks: [lra_net]

volumes:
  pg_data:
  redis_data:
  nginx_logs:

networks:
  lra_net:
    driver: bridge
